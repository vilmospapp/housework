<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Házimunka napló</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
    <div class="container">
        <div class="app-container">
            <div class="app-header">
                <h1>Házimunka napló</h1>
                <div class="user-profile dropdown">
                    <img id="userProfilePic" src="" alt="Profile" class="profile-pic dropdown-toggle" data-bs-toggle="dropdown">
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item" id="userName"></span></li>
                        <li><span class="dropdown-item" id="userEmail"></span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Sign Out</a></li>
                    </ul>
                </div>
            </div>
            
            <div class="app-body">
                <form id="taskForm">
                    <div class="mb-3">
                        <label for="taskSelect" class="form-label">Házimunka kiválasztása</label>
                        <select class="form-select" id="taskSelect" required>
                            <option value="" selected disabled>Válassz...</option>
                            <option value="trash">Szemét levitel</option>
                            <option value="room-clean">Saját szoba takarítás (1x per hó)</option>
                            <option value="drying">Teregetés</option>
                            <option value="dishwasher">Mosogatógép bepakolás</option>
                            <option value="wash">Mosás</option>
                            <option value="dinner">Vacsora készítés</option>
                            <option value="babysitting">Bébiszitterkedés (1 óra)</option>
                            <option value="shopping">Segítség a bevásárlásban</option>
                            <option value="lunch1">Ebéd készítés magadnak</option>
                            <option value="lunch2">Ebéd készítés magadnak és tesódnak is</option>
                            <option value="mark5">5-ös érdemjegy</option>
                            <option value="mark4">4-es érdemjegy</option>
                            <!-- Add more tasks as needed -->
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="dateInput" class="form-label">Dátum</label>
                        <input type="date" class="form-control" id="dateInput" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="timeInput" class="form-label">Idő</label>
                        <input type="time" class="form-control" id="timeInput" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Mentés</button>
                </form>
                
                <div class="mt-3 alert d-none" id="statusMessage"></div>

                <!-- New User Summary Section -->
                <div class="user-summary mt-4 p-3 rounded">
                    <h5 class="text-center mb-3">Összesítésed</h5>
                    <div class="d-flex justify-content-between">
                        <div>
                            <p class="mb-1">Teljes összeg:</p>
                            <h3 id="userEarnings">0Ft</h3>
                        </div>
                        <div class="text-end">
                            <p class="mb-1">Elvégzett munkák:</p>
                            <h4 id="userTaskCount">0</h4>
                        </div>
                    </div>
                    <p class="text-center mt-2 small text-muted" id="lastUpdated"></p>
                    <button id="refreshSummary" class="btn btn-sm btn-outline-secondary w-100 mt-2">
                        <i class="bi bi-arrow-clockwise"></i> Frissítés
                    </button>
                </div>

                <div class="records-section mt-4 p-3 rounded">
                    <!-- KATTINTHATÓ HEADER -->
                    <div id="recordsToggleHeader" 
                    class="d-flex justify-content-between align-items-center mb-3" 
                    style="cursor:pointer;">
                        <h5 class="mb-0">Elvégzett munkák</h5>
                        <span id="recordsToggleIcon">▼</span>
                    </div>
                </div>

                <!-- EZ LESZ A TOGGLE-ÖLT RÉSZ -->
                <div id="recordsContent" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Rögzített tételek</h5>
                        <button id="refreshRecords" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-arrow-clockwise"></i> Frissítés
                        </button>
                    </div>

                    <div class="row g-2 mb-2">
                        <div class="col-12 col-md-6">
                            <label for="recordTaskFilter" class="form-label small mb-1">Szűrés feladat szerint</label>
                            <select id="recordTaskFilter" class="form-select form-select-sm">
                                <option value="all">Mind</option>
                                <option value="trash">Szemét levitel</option>
                                <option value="room-clean">Saját szoba takarítás (1x per hó)</option>
                                <option value="drying">Teregetés</option>
                                <option value="dishwasher">Mosogatógép bepakolás</option>
                                <option value="wash">Mosás</option>
                                <option value="dinner">Vacsora készítés</option>
                                <option value="babysitting">Bébiszitterkedés (1 óra)</option>
                                <option value="shopping">Segítség a bevásárlásban</option>
                                <option value="lunch1">Ebéd készítés magadnak</option>
                                <option value="lunch2">Ebéd készítés magadnak és tesódnak is</option>
                                <option value="mark5">5-ös érdemjegy</option>
                                <option value="mark4">4-es érdemjegy</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="recordSortBy" class="form-label small mb-1">Rendezés</label>
                            <select id="recordSortBy" class="form-select form-select-sm">
                                <option value="date-desc">Legújabb elöl</option>
                                <option value="date-asc">Legrégebbi elöl</option>
                                <option value="task-asc">Feladat (A-Z)</option>
                                <option value="task-desc">Feladat (Z-A)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label for="recordDateFrom" class="form-label small mb-1">Dátumtól</label>
                            <input type="date" id="recordDateFrom" class="form-control form-control-sm">
                        </div>
                        <div class="col-6">
                            <label for="recordDateTo" class="form-label small mb-1">Dátumig</label>
                            <input type="date" id="recordDateTo" class="form-control form-control-sm">
                        </div>
                    </div>

                    <div id="recordsLoadingState" class="small text-muted mb-2 d-none">Betöltés...</div>
                    <div id="recordsStatusMessage" class="small text-muted mb-2 d-none"></div>
                    <div id="recordsEmptyState" class="small text-muted mb-2 d-none">Nincs megjeleníthető rekord.</div>

                    <div class="table-responsive">
                        <table class="table table-sm align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Feladat</th>
                                    <th>Dátum</th>
                                    <th>Idő</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
